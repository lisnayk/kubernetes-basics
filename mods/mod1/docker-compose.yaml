services:
  ingress:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./ingress/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend

  frontend:
    build: ./frontend
    environment:
      - STUDENT_NAME=${STUDENT_NAME:-Іванов Іван Іванович}
      - STUDENT_GROUP=${STUDENT_GROUP:-КН-1-1}
      - STUDENT_COURSE=${STUDENT_COURSE:-3}
