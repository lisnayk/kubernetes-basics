services:
  app-ingress:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./app-ingress/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - vue-frontend
      - api-backend

  vue-frontend:
    build: ./vue-frontend
    environment:
      - APP_TITLE=${APP_TITLE:-My App}
      - APP_ENV=${APP_ENV:-production}
      - DOCS_URL=${DOCS_URL:-/api-docs}
      - APP_BG_COLOR=${APP_BG_COLOR:-#f3f4f6}

  api-backend:
    build: ./api-backend
    environment:
      - PORT=3000
      - PRODUCTS_API_URL=http://api-products:3002/api/products
      - PRODUCTS_API_KEY=${PRODUCTS_API_KEY}
    depends_on:
      - api-products

  api-products:
    build: ./api-products
    environment:
      - PORT=3002
      - API_KEY_PROD=${API_KEY_PROD}
      - API_KEY_STAGE=${API_KEY_STAGE}
