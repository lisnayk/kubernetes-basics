apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-proxy-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-proxy
  template:
    metadata:
      labels:
        app: api-proxy
    spec:
      containers:
      - name: api-proxy
        image: lisnyak/k8s-demo-api-proxy:v1
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: api-proxy-service
spec:
  type: NodePort
  selector:
    app: api-proxy
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
