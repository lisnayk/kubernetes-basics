{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "k8s-monitor.fullname" . }}-cluster-role
  labels:
    {{- include "k8s-monitor.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log", "namespaces"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "k8s-monitor.fullname" . }}-cluster-binding
  labels:
    {{- include "k8s-monitor.labels" . | nindent 4 }}
subjects:
- kind: ServiceAccount
  name: {{ include "k8s-monitor.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "k8s-monitor.fullname" . }}-cluster-role
  apiGroup: rbac.authorization.k8s.io
{{- end }}
