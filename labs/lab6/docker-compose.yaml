services:
  blog:
    build:
      context: ./app
    ports:
      - "8081:3000"
    environment:
      - APP_TYPE=blog
      - STUDENT_NAME=Іван Іванов
      - STUDENT_GROUP=КП-11
      - NAMESPACE=docker-compose
    restart: always

  video:
    build:
      context: ./app
    ports:
      - "8082:3000"
    environment:
      - APP_TYPE=video
      - STUDENT_NAME=Іван Іванов
      - STUDENT_GROUP=КП-11
      - NAMESPACE=docker-compose
    restart: always
