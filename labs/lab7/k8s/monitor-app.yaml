apiVersion: v1
kind: Namespace
metadata:
  name: lab7
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pod-reader-sa
  namespace: lab7
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-reader-role
  namespace: lab7
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pod-reader-binding
  namespace: lab7
subjects:
- kind: ServiceAccount
  name: pod-reader-sa
  namespace: lab7
roleRef:
  kind: Role
  name: pod-reader-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-monitor
  namespace: lab7
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-monitor
  template:
    metadata:
      labels:
        app: k8s-monitor
    spec:
      serviceAccountName: pod-reader-sa
      containers:
      - name: monitor
        image: k8s-monitor:latest # Потрібно зібрати локально
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-monitor-service
  namespace: lab7
spec:
  selector:
    app: k8s-monitor
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: k8s-monitor-ingress
  namespace: lab7
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: lab7.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: k8s-monitor-service
            port:
              number: 80
