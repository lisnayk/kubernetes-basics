apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: lab3
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: lisnyak/lab3-backend:v2
          ports:
            - containerPort: 3000
          # TODO: Реалізуйте livenessProbe для перевірки працездатності додатка
          # livenessProbe:
          #   httpGet:
          #     path: /api/health
          #     port: 3000
          #   initialDelaySeconds: 5
          #   periodSeconds: 10
          
          # TODO: Реалізуйте readinessProbe для перевірки готовності додатка приймати трафік
          # readinessProbe:
          #   httpGet:
          #     path: /api/ready
          #     port: 3000
          #   initialDelaySeconds: 5
          #   periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "192Mi"
          env:
            - name: VERSION
              value: "v1"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
