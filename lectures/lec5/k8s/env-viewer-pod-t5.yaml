apiVersion: v1
kind: Pod
metadata:
  name: env-viewer-pod-t5
  labels:
    app: env-viewer
spec:
  containers:
  - name: env-viewer
    image: lisnyak/env-viewer:v3
    ports:
    - containerPort: 8080
    envFrom:
      - configMapRef:
          name: file-config
      - configMapRef:
          name: env-config
    volumeMounts:
    - name: config-volume
      mountPath: /etc/config
    - name: secret-volume
      mountPath: /secrets
      readOnly: true
  volumes:
  - name: config-volume
    configMap:
      name: file-config
  - name: secret-volume
    secret:
      secretName: env-secret
