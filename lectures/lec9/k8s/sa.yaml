apiVersion: v1
kind: ServiceAccount
metadata:
  name: build-robot
  namespace: development
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: build-robot-reader
  namespace: development
subjects:
- kind: ServiceAccount
  name: build-robot
  namespace: development
roleRef:
  kind: Role
  name: pod-reader
  apiGroup: rbac.authorization.k8s.io
