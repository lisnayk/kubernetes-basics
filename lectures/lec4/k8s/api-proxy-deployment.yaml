apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-proxy-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-proxy
  template:
    metadata:
      labels:
        app: api-proxy
    spec:
      containers:
      - name: api-proxy
        image: lisnyak/k8s-demo-api-proxy:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
