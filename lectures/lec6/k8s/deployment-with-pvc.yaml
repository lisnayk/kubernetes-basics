apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-pvc
spec:
  replicas: 2
  selector:
    matchLabels:
      app: deployment-pvc
  template:
    metadata:
      labels:
        app: deployment-pvc
    spec:
      volumes:
        - name: shared-storage
          persistentVolumeClaim:
            claimName: task-pv-claim
      containers:
        - name: nginx
          image: nginx
          volumeMounts:
            - name: shared-storage
              mountPath: /usr/share/nginx/html
